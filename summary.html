<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>總結</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    background: #111;
    color: #eee;
    font-family: sans-serif;
    padding: 20px;
}

h1 { margin-bottom: 20px; }

.summary-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: center;
    padding: 10px;
}

/* 卡片 */
.summary-card {
    background: linear-gradient(145deg, #1a1a1a, #222);
    border-radius: 12px;
    padding: 12px;
    width: calc(16.66% - 16px);
    box-sizing: border-box;
    position: relative;
    text-align: center;

    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.2s ease;
}

/* hover 效果 */
.summary-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    border-color: rgba(255,255,255,0.15);
}

/* 左上標題 */
.summary-card h3 {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    margin: 0;
    color: #ddd;
}

/* 右上資訊 */
.summary-card small {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.75rem;
    color: #aaa;
}

/* 圓餅圖 */
.summary-card canvas {
    margin-top: 28px;
    width: 90px !important;
    height: 90px !important;
}
</style>
</head>
<body data-page="summary">

<h1>📊 總結</h1>
<div id="navbar"></div>
<div class="summary-grid" id="summaryGrid">
    <!-- JS 會自動生成卡片和圓餅圖 -->
</div>

<script src="app.js"></script>
<script>
</script>
</body>
</html>
