<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>股票分析入口</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .tabs {
      display: flex;
      gap: 15px;
      margin: 20px 0;
      justify-content: center;
    }
    .tabs a {
      padding: 10px 20px;
      background: #222;
      color: #eee;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.2s;
    }
    .tabs a:hover {
      background: #444;
    }
    .tabs a.active {
      background: #007bff;
      color: #fff;
      font-weight: bold;
    }
    .note {
      background: #222;
      padding: 15px;
      border-radius: 8px;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
</head>
<body data-page="index">

<h1>📊 股票分析入口網站</h1>

<!-- Tab 連結 -->
<div class="tabs">
  <a href="index.html" class="tab-link">首頁</a>
  <a href="stocks.html" class="tab-link">個股清單</a>
  <a href="redgreen.html" class="tab-link">紅綠清單</a>
  <a href="summary.html" class="tab-link">總結</a>
</div>

<!-- 注意事項 / 使用說明 -->
<div class="note">
  <h2>使用與注意事項</h2>
  <ul>
    <li>每日資料更新後，請刷新各子頁面以查看最新資訊。</li>
    <li>個股清單頁面可查詢並篩選所有股票資訊。</li>
    <li>紅綠清單僅顯示符合特定條件的股票。</li>
    <li>總結頁面提供當日台股概況與統計圖表。</li>
    <li>目前網站為靜態頁面，所有資料更新需依賴 JSON。</li>
    <li>未來可添加更多功能 Tab，如自動提醒或歷史統計分析。</li>
  </ul>
  <p>此區域可自由編輯，補充每日或特殊公告。</p>
  <div id="latest-date" class="latest-date"></div>
</div>

<script src="app.js"></script>
<script>
  // 標記當前頁面的 Tab
  const page = document.body.getAttribute("data-page");
  document.querySelectorAll(".tabs a").forEach(a => {
    if(a.getAttribute("href") === page + ".html") {
      a.classList.add("active");
    }
  });
</script>

</body>
</html>
